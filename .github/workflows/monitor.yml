name: Monitor VK frontend vacancies

on:
  schedule:
    - cron: "15 7 * * 1"
    - cron: "15 8 * * 1"
    - cron: "15 9 * * 1"
  workflow_dispatch:
    inputs:
      send_test:
        description: "Send a Telegram test notification even if nothing changed"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install screenshot tooling
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Capture vacancy page screenshot
        env:
          SCREENSHOT_PATH: data/latest-page.png
        run: npm run screenshot || echo "Screenshot failed; continuing with text-only Telegram digest"

      - name: Archive active vacancy screenshots
        env:
          VACANCY_SCREENSHOT_DIR: data/vacancy-screenshots
        run: npm run archive-vacancy-screenshots || echo "Vacancy screenshot archive failed; continuing without closed-vacancy screenshots"

      - name: Check vacancies
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCREENSHOT_PATH: data/latest-page.png
          VACANCY_SCREENSHOT_DIR: data/vacancy-screenshots
          SEND_TEST_NOTIFICATION: ${{ inputs.send_test }}
        run: python scripts/monitor.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data REPORT.md package-lock.json
          git diff --cached --quiet || git commit -m "Update VK vacancy snapshot"
          git push
